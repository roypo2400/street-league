<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Street League ⚽</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#0f1525;--bg3:#151d30;--card:#1a2235;--card2:#1e2840;--border:#2a3550;
  --green:#00e676;--green2:#00c853;--green3:#1b5e20;--neon:#64ffda;--neon2:#00bcd4;
  --gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;--red:#ff5252;--orange:#ff9100;
  --text:#e8eaf6;--text2:#8892b0;--text3:#4a5568;
  --radius:12px;--radius2:20px;--shadow:0 4px 24px rgba(0,0,0,0.4);--shadow2:0 8px 40px rgba(0,230,118,0.1);
}
html,body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;direction:rtl}
body{overflow-x:hidden}
#root{min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.app{display:flex;flex-direction:column;min-height:100vh;width:100%;max-width:600px;margin:0 auto;position:relative}
@media(min-width:640px){.app{max-width:720px}}
@media(min-width:1024px){.app{max-width:860px}}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--green),var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-back{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text2);cursor:pointer;font-size:13px;font-family:'Heebo',sans-serif;transition:all 0.2s}
.header-back:hover{border-color:var(--green);color:var(--green)}
.bottom-nav{background:var(--bg2);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;right:0;left:0;max-width:600px;margin:0 auto;z-index:100}
@media(min-width:640px){.bottom-nav{max-width:720px}}
@media(min-width:1024px){.bottom-nav{max-width:860px}}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 14px;cursor:pointer;transition:all 0.2s;font-size:10px;color:var(--text3);gap:4px;border-top:2px solid transparent}
.nav-item.active{color:var(--green);border-top-color:var(--green)}
.nav-icon{font-size:20px}
.page{flex:1;padding:16px;padding-bottom:80px;overflow-y:auto}
.page-title{font-size:22px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.page-title .badge{background:var(--green3);color:var(--green);padding:2px 8px;border-radius:20px;font-size:12px;font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all 0.2s}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;border:none;font-family:'Heebo',sans-serif;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--green2),var(--green));color:#000}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,230,118,0.3)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--green);color:var(--green)}
.btn-danger{background:rgba(255,82,82,0.15);color:var(--red);border:1px solid rgba(255,82,82,0.3)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text3)}
.btn-lg{padding:14px 28px;font-size:16px;border-radius:var(--radius2)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-full{width:100%}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}
.form-group{margin-bottom:16px}
.form-label{display:block;margin-bottom:6px;font-size:13px;font-weight:600;color:var(--text2)}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'Heebo',sans-serif;transition:border-color 0.2s;direction:rtl}
.form-input:focus{outline:none;border-color:var(--green)}
.form-select{appearance:none;-webkit-appearance:none}
.form-error{color:var(--red);font-size:12px;margin-top:4px}
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.skill-label{width:70px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.skill-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;outline:none;cursor:pointer;background:var(--border)}
.skill-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid var(--bg)}
.skill-value{width:32px;text-align:center;font-size:13px;font-weight:700;color:var(--green)}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;position:relative;cursor:pointer;transition:all 0.25s}
.player-card:hover{transform:translateY(-3px);border-color:var(--green);box-shadow:0 8px 30px rgba(0,230,118,0.15)}
.player-card-header{background:linear-gradient(135deg,var(--bg2),var(--card2));padding:20px 16px 12px;display:flex;align-items:flex-start;gap:14px;position:relative;border-bottom:1px solid var(--border)}
.player-card-header::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,230,118,0.05),transparent);pointer-events:none}
.player-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover}
.player-info{flex:1;min-width:0}
.player-name{font-size:16px;font-weight:800;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-pos-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pos-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.foot-badge{background:rgba(100,255,218,0.1);color:var(--neon);padding:2px 8px;border-radius:20px;font-size:11px}
.player-rating{font-size:32px;font-weight:900;color:var(--green);line-height:1;text-shadow:0 0 20px rgba(0,230,118,0.4)}
.player-rating-label{font-size:10px;color:var(--text3);text-align:center;font-weight:600}
.player-card-stats{display:grid;grid-template-columns:repeat(4,1fr);padding:12px 16px;gap:8px}
.pstat{text-align:center}
.pstat-val{font-size:16px;font-weight:700}
.pstat-lbl{font-size:10px;color:var(--text3)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-box-val{font-size:20px;font-weight:800;color:var(--green)}
.stat-box-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.dash-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:4px}
.dash-card-icon{font-size:24px}
.dash-card-val{font-size:22px;font-weight:800}
.dash-card-lbl{font-size:11px;color:var(--text3)}
.dash-card.highlight{border-color:var(--green);background:linear-gradient(135deg,rgba(0,230,118,0.08),var(--card))}
.dash-card.highlight .dash-card-val{color:var(--green)}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:460px}
th{background:var(--bg2);padding:10px 12px;font-size:12px;color:var(--text3);font-weight:700;text-align:right;white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-top:1px solid var(--border);white-space:nowrap}
tr:hover td{background:var(--card2)}
.rank-badge{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.rank-1{background:var(--gold);color:#000}.rank-2{background:var(--silver);color:#000}.rank-3{background:var(--bronze);color:#fff}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.team-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.team-a-header{background:linear-gradient(90deg,rgba(0,230,118,0.15),transparent)}
.team-b-header{background:linear-gradient(90deg,rgba(100,255,218,0.15),transparent)}
.team-name{font-size:15px;font-weight:800}
.team-meta{font-size:12px;color:var(--text2)}
.team-player-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-top:1px solid var(--border)}
.goal-counter{display:flex;align-items:center;gap:8px}
.goal-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Heebo',sans-serif;transition:all 0.15s;flex-shrink:0}
.goal-btn:active{transform:scale(0.9)}
.goal-btn.plus{border-color:var(--green);color:var(--green)}
.goal-btn.minus{border-color:var(--red);color:var(--red)}
.goal-num{width:28px;text-align:center;font-size:16px;font-weight:800}
.score-section{display:flex;align-items:center;justify-content:center;gap:16px;background:var(--bg3);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.score-team{text-align:center;flex:1}
.score-team-name{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:600}
.score-input-wrap{display:flex;align-items:center;gap:8px;justify-content:center}
.score-num{font-size:40px;font-weight:900;color:var(--green);min-width:48px;text-align:center}
.score-sep{font-size:32px;font-weight:900;color:var(--text3)}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.2s}
.match-card:hover{border-color:var(--green);transform:translateY(-1px)}
.match-result{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.match-score{font-size:22px;font-weight:900;color:var(--green)}
.match-team-name{font-size:13px;color:var(--text2);flex:1}
.match-team-name.right{text-align:right}.match-team-name.left{text-align:left}
.match-date{font-size:11px;color:var(--text3);text-align:center}
.player-select-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.15s;margin-bottom:8px}
.player-select-item.selected{border-color:var(--green);background:rgba(0,230,118,0.08)}
.sel-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all 0.15s}
.player-select-item.selected .sel-check{background:var(--green);border-color:var(--green);color:#000}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card2);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.diff-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:8px}
.diff-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.diff-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.diff-a{background:var(--green)}.diff-b{background:var(--neon)}
.toast{position:fixed;top:70px;right:16px;left:16px;max-width:440px;margin:0 auto;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:14px;font-weight:600;z-index:300;animation:toastIn 0.3s ease;display:flex;align-items:center;gap:8px}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.warn{border-color:var(--orange);color:var(--orange)}
.divider{height:1px;background:var(--border);margin:16px 0}
.section-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.empty-state-text{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--text2)}
.empty-state-sub{font-size:13px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.chip-green{background:rgba(0,230,118,0.15);color:var(--green)}
.chip-blue{background:rgba(100,255,218,0.1);color:var(--neon)}
.chip-red{background:rgba(255,82,82,0.15);color:var(--red)}
.chip-gold{background:rgba(255,215,0,0.15);color:var(--gold)}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mt-8{margin-top:8px}.mt-16{margin-top:16px}
.text-right{text-align:right}.text-center{text-align:center}
.fw-800{font-weight:800}.text-green{color:var(--green)}.text-red{color:var(--red)}.text-muted{color:var(--text3)}
.w-full{width:100%}
.bg-grid{background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:24px 24px}
.avatar-sm{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.avatar-md{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.avatar-lg{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;flex-shrink:0}
.avatar-xl{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-overlay{position:fixed;inset:0;background:rgba(10,14,26,0.8);z-index:400;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(4px)}
.loading-text{font-size:14px;color:var(--text2)}
.rating-history-item{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.rh-change.pos{color:var(--green)}.rh-change.neg{color:var(--red)}.rh-change.neu{color:var(--text3)}
 
/* Login */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg);position:relative;overflow:hidden}
.login-screen::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,230,118,0.07),transparent 70%);top:-80px;right:-80px;pointer-events:none}
.login-screen::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(100,255,218,0.05),transparent 70%);bottom:-60px;left:-60px;pointer-events:none}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px 24px;width:100%;max-width:380px;position:relative;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{font-size:52px;margin-bottom:10px;display:block;filter:drop-shadow(0 0 20px rgba(0,230,118,0.4))}
.login-logo-title{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--green),var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.pin-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,230,118,0.1)}
.league-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;
 
/* ─── SUPABASE ─── */
const SUPABASE_URL = 'https://eapelkekvmdbefeabmbl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcGVsa2Vrdm1kYmVmZWFibWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNjI1NjYsImV4cCI6MjA5NTYzODU2Nn0.-bu9RMrtO7_iSBgYaw-k_QYywc2m_h6of2gBERUpuVo';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
 
/* ─── CONSTANTS ─── */
const POSITIONS = { GK:'שוער', DEF:'הגנה', MID:'קישור', FWD:'התקפה', ANY:'כלבו' };
const FEET = { right:'ימין', left:'שמאל', both:'שתיהן' };
const SKILLS_DEF = ['pace','shooting','passing','dribbling','defending','physical','vision','finishing'];
const SKILL_LABELS = { pace:'מהירות', shooting:'בעיטה', passing:'מסירה', dribbling:'דריבל', defending:'הגנה', physical:'פיזיות', vision:'ראייה', finishing:'סיומת' };
const POS_COLORS = { GK:'#ffd700', DEF:'#00bcd4', MID:'#00e676', FWD:'#ff5252', ANY:'#b39ddb' };
 
/* ─── LEAGUE API ─── */
const hashPin = (pin) => {
  let h = 0;
  for (let i=0;i<pin.length;i++) h=(Math.imul(31,h)+pin.charCodeAt(i))|0;
  return (h>>>0).toString(36);
};
const slugify = (name) => name.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^\wא-ת]/g,'');
 
const apiGetLeagues = async () => {
  const { data } = await sb.from('leagues').select('*').order('created_at');
  return data || [];
};
const apiCreateLeague = async (name, pin) => {
  const slug = slugify(name) || `league_${Date.now()}`;
  const { error } = await sb.from('leagues').insert({ slug, name: name.trim(), pin_hash: hashPin(pin) });
  if (error) return { error: error.code==='23505' ? 'קבוצה בשם זה כבר קיימת' : 'שגיאה ביצירת הקבוצה' };
  return { slug };
};
const apiVerifyLeague = async (slug, pin) => {
  const { data, error } = await sb.from('leagues').select('*').eq('slug', slug).single();
  if (error || !data) return { error: 'קבוצה לא נמצאה' };
  if (data.pin_hash !== hashPin(pin)) return { error: 'קוד שגוי' };
  return { ok: true, league: data };
};
 
/* ─── DATA API ─── */
const apiGetPlayers = async (lid) => {
  const { data } = await sb.from('players').select('*').eq('league_id', lid).order('rating', {ascending:false});
  return data || [];

/* ─── RATING ENGINE ─── */
function computeRatingChanges(teamAPlayers, teamBPlayers, teamAScore, teamBScore, goalMap) {
  const avgA = avg(teamAPlayers.map(p=>p.rating));
  const avgB = avg(teamBPlayers.map(p=>p.rating));
  const changes = [];
  const process = (players, scored, conceded, avgOwn, avgOpp) => {
    const won = scored > conceded, drew = scored === conceded;
    let base = won ? 20 : drew ? 5 : -15;
    let bonus = 0;
    if (won && avgOpp > avgOwn) bonus = Math.min(15, Math.round((avgOpp-avgOwn)/20)*5+5);
    players.forEach(p => {
      const goals = goalMap[p.id]||0;
      const change = base + bonus + goals*3;
      const after = Math.max(100, p.rating + change);
      changes.push({ player_id:p.id, rating_before:p.rating, rating_change:after-p.rating, rating_after:after,
        reason: won?'ניצחון':drew?'תיקו':'הפסד', goals, bonus });
    });
  };
  process(teamAPlayers, teamAScore, teamBScore, avgA, avgB);
  process(teamBPlayers, teamBScore, teamAScore, avgB, avgA);
  return changes;
}
 
/* ─── TEAM BALANCER (N teams) ─── */
function balanceTeams(players, numTeams=2, attempt=0, useRaw=false) {
  if (players.length < numTeams) return { teams:[players,...Array(numTeams-1).fill([])], bench:[] };
  const ratingOf=p=>useRaw&&p.raw_rating?(p.raw_rating*200):p.rating;
  const sorted=[...players].sort((a,b)=>ratingOf(b)-ratingOf(a));
  const benchCount=sorted.length%numTeams;
  const bench=benchCount>0 ? sorted.splice(sorted.length-benchCount) : [];
  const teams=Array.from({length:numTeams},()=>[]);
  if(attempt===0){
    // Snake draft
    sorted.forEach((p,i)=>{
      const round=Math.floor(i/numTeams);
      const idx=round%2===0 ? i%numTeams : numTeams-1-(i%numTeams);
      teams[idx].push(p);
    });
  } else {
    const sh=[...sorted];
    for(let i=sh.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]];}
    sh.forEach((p,i)=>teams[i%numTeams].push(p));
  }
  // Distribute GKs evenly
  const gksByTeam=teams.map(t=>t.filter(p=>p.preferred_position==='GK'));
  gksByTeam.forEach((gks,ti)=>{
    if(gks.length>1){
      gks.slice(1).forEach(gk=>{
        const targetTeam=teams.reduce((best,t,i)=>i!==ti&&gksByTeam[i].length<gksByTeam[best].length?i:best,0);
        teams[ti]=teams[ti].filter(p=>p.id!==gk.id);
        teams[targetTeam].push(gk);
      });
    }
  });
  return { teams, bench };
}
 
/* ─── RATING ENGINE (N teams) ─── */
function computeRatingChangesMulti(teamPlayers, scores, goalMap) {
  const maxScore=Math.max(...scores);
  const winners=scores.filter(s=>s===maxScore).length;
  const isAllTied=winners===scores.length;
  const changes=[];
  teamPlayers.forEach((players,ti)=>{
    const myScore=scores[ti];
    const won=!isAllTied && myScore===maxScore;
    const drew=isAllTied || (!won && scores.filter(s=>s===myScore).length>0 && myScore===maxScore);
    const tied=isAllTied;
    const lost=!won&&!tied;
    const base=won?20:tied?5:-15;
    const avgMine=avg(players.map(p=>p.rating));
    const avgOthers=avg(teamPlayers.filter((_,i)=>i!==ti).flat().map(p=>p.rating));
    const bonus=won&&avgOthers>avgMine?Math.min(15,Math.round((avgOthers-avgMine)/20)*5+5):0;
    players.forEach(p=>{
      const goals=goalMap[p.id]||0;
      const change=base+bonus+goals*3;
      const after=Math.max(100,p.rating+change);
      changes.push({player_id:p.id,rating_before:p.rating,rating_change:after-p.rating,rating_after:after,
        reason:won?'ניצחון':tied?'תיקו':'הפסד',goals,bonus,teamIndex:ti});
    });
  });
  return changes;
}
 
/* ─── SKILL RADAR ─── */
function SkillRadar({ skills, size=200 }) {
  const n=SKILLS_DEF.length, cx=size/2, cy=size/2, r=size*0.36, labelR=size*0.46;
  const toXY=(i,ratio)=>{ const a=(i*2*Math.PI/n)-Math.PI/2; return {x:cx+r*ratio*Math.cos(a),y:cy+r*ratio*Math.sin(a)}; };
  const gridPts=(ratio)=>SKILLS_DEF.map((_,i)=>{const p=toXY(i,ratio);return `${p.x},${p.y}`;}).join(' ');
  const vals=SKILLS_DEF.map(k=>(skills[k]||50)/100);
  const dataPts=SKILLS_DEF.map((_,i)=>{const p=toXY(i,vals[i]);return `${p.x},${p.y}`;}).join(' ');
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{overflow:'visible'}}>
      {[0.25,0.5,0.75,1].map((l,li)=><polygon key={li} points={gridPts(l)} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={li===3?1.5:0.8}/>)}
      {SKILLS_DEF.map((_,i)=>{const p=toXY(i,1);return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>;})}
      <polygon points={dataPts} fill="rgba(0,230,118,0.18)" stroke="rgba(0,230,118,0.8)" strokeWidth="1.5"/>
      {SKILLS_DEF.map((_,i)=>{const p=toXY(i,vals[i]);return <circle key={i} cx={p.x} cy={p.y} r="3" fill="#00e676"/>;} )}
      {SKILLS_DEF.map((k,i)=>{const lp=toXY(i,1.28);return <text key={i} x={lp.x} y={lp.y} textAnchor="middle" dominantBaseline="middle" fontSize="9.5" fill="rgba(136,146,176,0.9)" fontFamily="Heebo,sans-serif">{SKILL_LABELS[k]}</text>;})}
    </svg>
  );
}

      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <div className="form-group" style={{margin:0}}>
          <label className="form-label">תפקיד</label>
          <select className="form-input form-select" value={form.preferred_position} onChange={e=>setForm(f=>({...f,preferred_position:e.target.value}))}>
            {Object.entries(POSITIONS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        <div className="form-group" style={{margin:0}}>
          <label className="form-label">רגל חזקה</label>
          <select className="form-input form-select" value={form.strong_foot} onChange={e=>setForm(f=>({...f,strong_foot:e.target.value}))}>

/* ─── NEW GAME ─── */

  const toggle=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const toggleAll=()=>setSelected(allSelected?[]:players.map(p=>p.id));
  const canDivide=selected.length>=numTeams;
  return (
    <div className="page fade-in">
      <div className="page-title">⚡ משחק חדש</div>
      {/* Team count selector */}
      <div className="card mb-12">
        <div style={{fontSize:13,fontWeight:700,color:'var(--text2)',marginBottom:10}}>מספר קבוצות</div>
        <div style={{display:'flex',gap:8}}>
          {[2,3,4].map(n=>(
            <button key={n} onClick={()=>setNumTeams(n)}
              style={{flex:1,padding:'10px 0',borderRadius:10,border:`2px solid ${numTeams===n?TEAM_COLORS[0]:'var(--border)'}`,background:numTeams===n?`${TEAM_COLORS[0]}18`:'var(--bg3)',color:numTeams===n?TEAM_COLORS[0]:'var(--text2)',fontWeight:800,fontSize:16,cursor:'pointer',fontFamily:'Heebo,sans-serif',transition:'all 0.15s'}}>
              {n}
            </button>
          ))}
        </div>
      </div>
      {/* Header bar */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={toggleAll} style={{background:'none',border:'none',color:'var(--green)',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>
          {allSelected?'בטל הכל':'בחר הכל'}
        </button>
        <span style={{fontSize:18,fontWeight:900,color:canDivide?'var(--green)':'var(--text3)'}}>{selected.length} נבחרו</span>
      </div>
      {players.map(p=>(
        <div key={p.id} className={`player-select-item ${selected.includes(p.id)?'selected':''}`} onClick={()=>toggle(p.id)}>

          <div className="sel-check">{selected.includes(p.id)?'✓':''}</div>
        </div>
      ))}
      <div style={{position:'sticky',bottom:70,paddingTop:12,background:'var(--bg)'}}>
        <button className="btn btn-primary btn-lg btn-full" disabled={!canDivide} onClick={()=>onNext(selected,numTeams)}>
          חלק ל-{numTeams} קבוצות ({selected.length} שחקנים)
        </button>
        {!canDivide&&selected.length>0&&<div style={{textAlign:'center',fontSize:12,color:'var(--text3)',marginTop:8}}>נדרשים לפחות {numTeams} שחקנים</div>}
      </div>
    </div>
  );
}
 
/* ─── TEAM SPLIT ─── */
function TeamSplit({ players, selectedIds, numTeams=2, onStart }) {
  const sel=useMemo(()=>players.filter(p=>selectedIds.includes(p.id)),[players,selectedIds]);
  const hasRaw=useMemo(()=>sel.some(p=>p.raw_rating>0),[sel]);
  const [useRaw,setUseRaw]=useState(false);
  const [attempt,setAttempt]=useState(0);
  const [split,setSplit]=useState(()=>balanceTeams(sel,numTeams,0,false));
  const reshuffle=()=>{const a=attempt+1;setAttempt(a);setSplit(balanceTeams(sel,numTeams,a,useRaw));};
  const toggleUseRaw=()=>{const nr=!useRaw;setUseRaw(nr);setAttempt(0);setSplit(balanceTeams(sel,numTeams,0,nr));};
  const movePlayer=(pid,fromIdx,toIdx)=>{
    setSplit(prev=>{
      const ts=prev.teams.map(t=>[...t]);
      const p=ts[fromIdx].find(x=>x.id===pid);
      if(!p) return prev;
      ts[fromIdx]=ts[fromIdx].filter(x=>x.id!==pid);
      ts[toIdx]=[...ts[toIdx],p];
      return{...prev,teams:ts};
    });
  };
  const ratingOf=p=>useRaw&&p.raw_rating?(p.raw_rating*200):p.rating;
  const avgR=arr=>arr.length?Math.round(avg(arr.map(ratingOf))):0;
  const sumR=arr=>arr.reduce((s,p)=>s+ratingOf(p),0);
  const totalR=split.teams.reduce((s,t)=>s+sumR(t),0);
  const maxDiff=useMemo(()=>{
    const sums=split.teams.map(sumR);
    return Math.max(...sums)-Math.min(...sums);
  },[split,useRaw]);
  return (
    <div className="page fade-in">
      <div className="page-title">⚖️ חלוקת קבוצות</div>
      {hasRaw&&<div style={{display:'flex',gap:8,marginBottom:12}}>
        <button onClick={()=>!useRaw||toggleUseRaw()} style={{flex:1,padding:'8px 0',borderRadius:10,border:`2px solid ${!useRaw?'var(--green)':'var(--border)'}`,background:!useRaw?'var(--green3)':'var(--bg3)',color:!useRaw?'var(--green)':'var(--text2)',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>
          דירוג מחושב
        </button>
        <button onClick={()=>useRaw||toggleUseRaw()} style={{flex:1,padding:'8px 0',borderRadius:10,border:`2px solid ${useRaw?'var(--gold)':'var(--border)'}`,background:useRaw?'rgba(255,215,0,0.1)':'var(--bg3)',color:useRaw?'var(--gold)':'var(--text2)',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>
          דירוג בתכל׳ס ★
        </button>
      </div>}
      <div className="card mb-12" style={{borderColor:'var(--green)33'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:13,color:'var(--text3)'}}>פער מקסימלי</div>
          <div style={{fontSize:22,fontWeight:900,color:maxDiff<50?'var(--green)':maxDiff<100?'var(--orange)':'var(--red)'}}>{maxDiff}</div>
        </div>
        <div style={{display:'flex',gap:4,height:8,borderRadius:4,overflow:'hidden'}}>
          {split.teams.map((t,i)=>(
            <div key={i} style={{flex:sumR(t)||1,background:TEAM_COLORS[i],borderRadius:4,transition:'flex 0.4s ease'}}/>
          ))}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
          {split.teams.map((t,i)=>(
            <div key={i} style={{fontSize:11,color:TEAM_COLORS[i],fontWeight:700}}>{TEAM_ICONS[i]} {avgR(t)}</div>
          ))}
        </div>
      </div>
      {split.teams.map((team,ti)=>(
        <div key={ti} className="team-card">
          <div className="team-header" style={{background:`linear-gradient(90deg,${TEAM_COLORS[ti]}18,transparent)`}}>
            <div>
              <div className="team-name" style={{color:TEAM_COLORS[ti]}}>{TEAM_ICONS[ti]} קבוצה {TEAM_NAMES_HE[ti]}</div>
              <div className="team-meta">{team.length} שחקנים • ממוצע: {avgR(team)} • סכום: {sumR(team)}</div>
            </div>
          </div>
          {team.map(p=>(
            <div key={p.id} className="team-player-row">
              <div className="flex items-center gap-8">
                <Avatar player={p} size="sm"/>
                <div><div style={{fontWeight:700,fontSize:14}}>{p.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{POSITIONS[p.preferred_position]} • {p.rating}{p.raw_rating>0?<span style={{color:'var(--gold)',marginRight:4}}>{'★'.repeat(p.raw_rating)}</span>:''}</div></div>
              </div>
              <div style={{display:'flex',gap:4}}>
                {split.teams.map((_,toIdx)=>toIdx!==ti&&(
                  <button key={toIdx} className="btn btn-ghost btn-sm" style={{color:TEAM_COLORS[toIdx],borderColor:TEAM_COLORS[toIdx]+'44',padding:'4px 8px'}}
                    onClick={()=>movePlayer(p.id,ti,toIdx)}>
                    {TEAM_ICONS[toIdx]}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      ))}
      {split.bench&&split.bench.length>0&&(
        <div className="card mb-12" style={{borderColor:'var(--orange)44'}}>
          <div style={{color:'var(--orange)',fontWeight:700,marginBottom:8}}>⏱️ ממתינים / מחליפים</div>
          {split.bench.map(p=>(
            <div key={p.id} className="flex items-center gap-8" style={{marginBottom:6}}>
              <Avatar player={p} size="sm"/>
              <div style={{fontWeight:700}}>{p.name}</div>
            </div>
          ))}
        </div>
      )}
      <div className="flex gap-8 mt-16">
        <button className="btn btn-secondary" onClick={reshuffle}>🔀 ערבב שוב</button>
        <button className="btn btn-primary btn-full" onClick={()=>onStart(split)}>▶️ התחל משחק</button>
      </div>
    </div>
  );
}
 
/* ─── END GAME (N teams) ─── */
function EndGame({ players, split, onSave }) {
  const teams=split.teams||[];
  const [scores,setScores]=useState(()=>Array(teams.length).fill(0));
  const [goals,setGoals]=useState({});
  const [warn,setWarn]=useState('');
  const setGoal=(id,delta)=>setGoals(g=>({...g,[id]:Math.max(0,(g[id]||0)+delta)}));
  const setScore=(i,delta)=>setScores(s=>{const n=[...s];n[i]=Math.max(0,n[i]+delta);return n;});
  const handleSave=()=>{
    let w='';
    teams.forEach((team,i)=>{
      const tg=(team||[]).reduce((s,p)=>s+(goals[p.id]||0),0);
      if(tg!==scores[i]) w+=`קבוצה ${TEAM_NAMES_HE[i]}: שערי שחקנים (${tg}) שונה מתוצאה (${scores[i]}). `;
    });
    if(w) setWarn(w);
    onSave({scores,goals,split});
  };
  return (
    <div className="page fade-in">
      <div className="page-title">🏁 סיום משחק</div>
      {warn&&<div style={{background:'rgba(255,145,0,0.1)',border:'1px solid rgba(255,145,0,0.3)',borderRadius:8,padding:'8px 12px',fontSize:13,color:'var(--orange)',marginBottom:12}}>{warn}</div>}
      {/* Scores */}
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {teams.map((team,i)=>(
          <div key={i} style={{flex:1,background:'var(--bg3)',border:`1px solid ${TEAM_COLORS[i]}44`,borderRadius:12,padding:'14px 8px',textAlign:'center'}}>
            <div style={{fontSize:11,fontWeight:700,color:TEAM_COLORS[i],marginBottom:8}}>{TEAM_ICONS[i]} קבוצה {TEAM_NAMES_HE[i]}</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <button className="goal-btn minus" onClick={()=>setScore(i,-1)}>−</button>
              <div style={{fontSize:36,fontWeight:900,color:TEAM_COLORS[i],minWidth:36,textAlign:'center'}}>{scores[i]}</div>
              <button className="goal-btn plus" onClick={()=>setScore(i,1)}>+</button>
            </div>
          </div>
        ))}
      </div>
      {/* Goals per player */}
      <div className="section-title">שערים לשחקן</div>
      {teams.map((team,i)=>(
        <div key={i} className="team-card mb-12">
          <div className="team-header" style={{background:`linear-gradient(90deg,${TEAM_COLORS[i]}18,transparent)`}}>
            <div className="team-name" style={{color:TEAM_COLORS[i]}}>{TEAM_ICONS[i]} קבוצה {TEAM_NAMES_HE[i]}</div>
          </div>
          {(team||[]).map(p=>(
            <div key={p.id} className="team-player-row">
              <div className="flex items-center gap-8"><Avatar player={p} size="sm"/><div style={{fontWeight:700,fontSize:14}}>{p.name}</div></div>
              <div className="goal-counter">
                <button className="goal-btn minus" onClick={()=>setGoal(p.id,-1)}>−</button>
                <div className="goal-num">{goals[p.id]||0}</div>
                <button className="goal-btn plus" onClick={()=>setGoal(p.id,1)}>+</button>
              </div>
            </div>
          ))}
        </div>
      ))}
      <button className="btn btn-primary btn-lg btn-full" onClick={handleSave}>💾 שמור משחק ועדכן סטטיסטיקות</button>
    </div>
  );
}
 
/* ─── MATCH HISTORY ─── */
function MatchHistory({ matches, players, onNav }) {
  return (
    <div className="page fade-in">
      <div className="page-title">📋 היסטוריה <span className="badge">{matches.length}</span></div>
      {matches.length===0?<div className="empty-state"><div className="empty-state-icon">🏟️</div><div className="empty-state-text">אין משחקים עדיין</div></div>:matches.map(m=>{
        const pA=players.filter(p=>(m.team_a_player_ids||[]).includes(p.id));
        const pB=players.filter(p=>(m.team_b_player_ids||[]).includes(p.id));
        const win=m.team_a_score>m.team_b_score?'A':m.team_b_score>m.team_a_score?'B':'D';
        return (
          <div key={m.id} className="match-card" onClick={()=>onNav('match-detail',{matchId:m.id})}>
            <div className="flex items-center justify-between mb-8">
              <div style={{fontSize:11,color:'var(--text3)'}}>{formatDate(m.created_at)}</div>
              <div className={`chip ${win==='D'?'chip-blue':'chip-green'}`}>{win==='D'?'תיקו':win==='A'?'א׳ ניצחה':'ב׳ ניצחה'}</div>
            </div>
            <div className="match-result">
              <div className="match-team-name right">{pA.slice(0,3).map(p=>p.name.split(' ')[0]).join(', ')}</div>
              <div className="match-score" style={{color:win==='A'?'var(--green)':win==='B'?'var(--red)':'var(--text2)'}}>{m.team_a_score} - {m.team_b_score}</div>
              <div className="match-team-name left">{pB.slice(0,3).map(p=>p.name.split(' ')[0]).join(', ')}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}
 
/* ─── MATCH DETAIL ─── */
function MatchDetail({ match, players, matchPlayers }) {
  const pA=players.filter(p=>(match.team_a_player_ids||[]).includes(p.id));
  const pB=players.filter(p=>(match.team_b_player_ids||[]).includes(p.id));
  const mps=matchPlayers.filter(mp=>mp.match_id===match.id);
  const getMP=id=>mps.find(mp=>mp.player_id===id);
  const win=match.team_a_score>match.team_b_score?'A':match.team_b_score>match.team_a_score?'B':'D';
  const renderTeam=(team,label,color)=>(
    <div className="team-card mb-12">
      <div className="team-header" style={{background:`linear-gradient(90deg,${color}18,transparent)`}}>
        <div className="team-name" style={{color}}>{label}</div>
      </div>
      {team.map(p=>{const mp=getMP(p.id);return(
        <div key={p.id} className="team-player-row">
          <div className="flex items-center gap-8"><Avatar player={p} size="sm"/><div><div style={{fontWeight:700,fontSize:14}}>{p.name}</div>{mp&&<div style={{fontSize:11,color:'var(--text3)'}}>⚽ {mp.goals}</div>}</div></div>
          {mp&&<div style={{textAlign:'center'}}><div style={{fontSize:13,fontWeight:700,color:mp.rating_change>0?'var(--green)':'var(--red)'}}>{mp.rating_change>0?'+':''}{mp.rating_change}</div><div style={{fontSize:10,color:'var(--text3)'}}>{mp.rating_before} → {mp.rating_after}</div></div>}
        </div>
      );})}
    </div>
  );
  return (
    <div className="page fade-in">
      <div className="page-title">🏟️ פרטי משחק</div>
      <div className="card mb-16" style={{textAlign:'center',borderColor:'var(--green)33'}}>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>{formatDate(match.created_at)}</div>
        <div style={{fontSize:48,fontWeight:900,color:'var(--green)'}}>{match.team_a_score} - {match.team_b_score}</div>
        <div className={`chip ${win==='D'?'chip-blue':win==='A'?'chip-green':'chip-red'}`} style={{marginTop:8}}>{win==='D'?'🤝 תיקו':win==='A'?'⚡ קבוצה א׳ ניצחה':'🌊 קבוצה ב׳ ניצחה'}</div>
      </div>
      {renderTeam(pA,'⚡ קבוצה א׳','#00e676')}
      {renderTeam(pB,'🌊 קבוצה ב׳','#64ffda')}
    </div>
  );
}
 
/* ─── RANKINGS ─── */
function Rankings({ players }) {
  const sorted=useMemo(()=>[...players].sort((a,b)=>b.rating-a.rating),[players]);
  return (
    <div className="page fade-in">
      <div className="page-title">🏆 טבלת דירוג</div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>#</th><th>שם</th><th>דירוג</th><th>בתכל׳ס</th><th>מ׳</th><th>נ׳</th><th>ה׳</th><th>⚽</th><th>%נצ׳</th></tr></thead>
          <tbody>
            {sorted.map((p,i)=>{
              const wr=p.stats.games?Math.round(p.stats.wins/p.stats.games*100):0;
              return <tr key={p.id}>
                <td>{i<3?<span className={`rank-badge rank-${i+1}`}>{i+1}</span>:<span style={{color:'var(--text3)',fontWeight:700}}>{i+1}</span>}</td>
                <td><div className="flex items-center gap-8"><Avatar player={p} size="sm"/><span style={{fontWeight:700}}>{p.name}</span></div></td>
                <td style={{fontWeight:800,color:'var(--green)'}}>{p.rating}</td>
                <td style={{color:'var(--gold)',fontSize:13}}>{p.raw_rating>0?'★'.repeat(p.raw_rating):'—'}</td>
                <td>{p.stats.games}</td><td style={{color:'var(--green)'}}>{p.stats.wins}</td>
                <td style={{color:'var(--red)'}}>{p.stats.losses}</td><td>{p.stats.goals}</td>
                <td style={{color:'var(--neon)'}}>{wr}%</td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}
 
/* ═══════════ APP ═══════════ */
function App() {
  const [league,setLeague]=useState(()=>getSession());
  const [players,setPlayers]=useState([]);
  const [matches,setMatches]=useState([]);
  const [matchPlayers,setMatchPlayers]=useState([]);
  const [ratingHistory,setRatingHistory]=useState([]);
  const [screen,setScreen]=useState('dashboard');
  const [params,setParams]=useState({});
  const [gameState,setGameState]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(false);
  const showToast=(msg,type='success')=>setToast({msg,type});
  const nav=(s,p={})=>{setScreen(s);setParams(p);};
 
  const refreshData=useCallback(async(lg)=>{
    const lid=lg.slug;
    const [p,m,mp,rh]=await Promise.all([apiGetPlayers(lid),apiGetMatches(lid),apiGetMatchPlayers(lid),apiGetRatingHistory(lid)]);
    setPlayers(p);setMatches(m);setMatchPlayers(mp);setRatingHistory(rh);
  },[]);
 
  useEffect(()=>{
    if(league){setLoading(true);refreshData(league).finally(()=>setLoading(false));}
  },[league]);
 
  const handleLogin=(lg)=>{setLeague(lg);setScreen('dashboard');setGameState(null);};
  const handleLogout=()=>{clearSession();setLeague(null);setPlayers([]);setMatches([]);setMatchPlayers([]);setRatingHistory([]);setScreen('dashboard');setGameState(null);};
 
  if(!league) return <LoginScreen onLogin={handleLogin}/>;
 
  /* ─── CRUD ─── */
  const addPlayer=async(data)=>{
    setLoading(true);
    const p={id:uid(),league_id:league.slug,...data,stats:{games:0,wins:0,losses:0,draws:0,goals:0},created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
    const{error}=await sb.from('players').insert(p);
    if(error){showToast('שגיאה בשמירה','error');setLoading(false);return;}
    await refreshData(league);
    setLoading(false);showToast(`${p.name} נוסף! 🎉`);nav('players');
  };
 
  const editPlayer=async(id,data)=>{
    setLoading(true);
    const{error}=await sb.from('players').update({...data,updated_at:new Date().toISOString()}).eq('id',id);
    if(error){showToast('שגיאה בשמירה','error');setLoading(false);return;}
    await refreshData(league);
    setLoading(false);showToast('נשמר ✅');nav('player-detail',{playerId:id});
  };
 
  const deletePlayer=async(id)=>{
    setLoading(true);
    await sb.from('players').delete().eq('id',id);
    await refreshData(league);
    setLoading(false);showToast('שחקן נמחק','warn');
    if(screen==='player-detail') nav('players');
  };
 
  const saveMatch=async({scores,goals,split})=>{
    setLoading(true);
    try{
      const matchId=uid();const now=new Date().toISOString();const lid=league.slug;
      const teamsList=split.teams||[];
      const bench=split.bench||[];
      const match={
        id:matchId,league_id:lid,date:now,created_at:now,
        team_a_score:scores[0]||0, team_b_score:scores[1]||0,
        team_a_player_ids:(teamsList[0]||[]).map(p=>p.id),
        team_b_player_ids:(teamsList[1]||[]).map(p=>p.id),
        bench_player_id:bench[0]?.id||null,
      };
      await sb.from('matches').insert(match);
      const changes=computeRatingChangesMulti(teamsList,scores,goals);
      const mps=changes.map(c=>({id:uid(),match_id:matchId,player_id:c.player_id,league_id:lid,
        team:TEAM_NAMES_HE[c.teamIndex]||'?',goals:goals[c.player_id]||0,
        rating_before:c.rating_before,rating_change:c.rating_change,rating_after:c.rating_after}));
      if(mps.length) await sb.from('match_players').insert(mps);
      const rhs=changes.map(c=>({id:uid(),player_id:c.player_id,match_id:matchId,league_id:lid,date:now,
        rating_before:c.rating_before,rating_change:c.rating_change,rating_after:c.rating_after,
        reason:c.reason+(c.bonus?` +בונוס`:'')+(c.goals?` +${c.goals}`:'')}));
      if(rhs.length) await sb.from('rating_history').insert(rhs);
      const maxScore=Math.max(...scores);
      const isAllTied=scores.every(s=>s===maxScore);
      const updates=changes.map(c=>{
        const curP=players.find(x=>x.id===c.player_id);if(!curP)return null;
        const myScore=scores[c.teamIndex];
        const won=!isAllTied&&myScore===maxScore;
        const tied=isAllTied;const lost=!won&&!tied;
        return sb.from('players').update({rating:c.rating_after,
          stats:{games:curP.stats.games+1,wins:curP.stats.wins+(won?1:0),losses:curP.stats.losses+(lost?1:0),draws:curP.stats.draws+(tied?1:0),goals:curP.stats.goals+(goals[c.player_id]||0)},
          updated_at:now}).eq('id',c.player_id);
      }).filter(Boolean);
      await Promise.all(updates);
      await refreshData(league);
      setGameState(null);showToast('משחק נשמר! 🏆');nav('match-detail',{matchId});
    }catch(e){console.error(e);showToast('שגיאה בשמירה','error');}
    setLoading(false);
  };
 
  /* ─── RENDER ─── */
  const titles={dashboard:'Street League ⚽',players:'שחקנים',rankings:'דירוג',history:'היסטוריה','add-player':'שחקן חדש','edit-player':'עריכת שחקן','player-detail':'פרופיל שחקן','match-detail':'פרטי משחק'};
  const renderScreen=()=>{
    if(gameState){
      if(gameState.phase==='select') return <NewGame players={players} onNext={(ids,n)=>setGameState({phase:'teams',selectedIds:ids,numTeams:n})}/>;
      if(gameState.phase==='teams') return <TeamSplit players={players} selectedIds={gameState.selectedIds} numTeams={gameState.numTeams||2} onStart={split=>setGameState({phase:'end',split})}/>;
      if(gameState.phase==='end') return <EndGame players={players} split={gameState.split} onSave={saveMatch}/>;
    }
    switch(screen){
      case 'dashboard': return <Dashboard players={players} matches={matches} onNav={nav}/>;
      case 'players': return <Players players={players} onNav={nav} onDelete={deletePlayer}/>;
      case 'add-player': return <PlayerForm onSave={addPlayer} onBack={()=>nav('players')}/>;
      case 'edit-player':{ const p=players.find(x=>x.id===params.playerId); return p?<PlayerForm player={p} onSave={d=>editPlayer(p.id,d)} onBack={()=>nav('player-detail',{playerId:p.id})}/>:null; }
      case 'player-detail':{ const p=players.find(x=>x.id===params.playerId); return p?<PlayerDetail player={p} ratingHistory={ratingHistory} onNav={nav}/>:null; }
      case 'history': return <MatchHistory matches={matches} players={players} onNav={nav}/>;
      case 'match-detail':{ const m=matches.find(x=>x.id===params.matchId); return m?<MatchDetail match={m} players={players} matchPlayers={matchPlayers}/>:null; }
      case 'rankings': return <Rankings players={players}/>;
      default: return <Dashboard players={players} matches={matches} onNav={nav}/>;
    }
  };
  const activeNav=gameState?'new-game':screen;
  const showBack=gameState||!['dashboard','players','history','rankings'].includes(screen);
  const handleNavClick=s=>{if(s==='new-game'){setGameState({phase:'select'});}else{setGameState(null);nav(s);}};
  const handleBack=()=>{
    if(gameState){
      if(gameState.phase==='select'){setGameState(null);nav('dashboard');}
      else if(gameState.phase==='teams') setGameState({phase:'select',selectedIds:gameState.selectedIds});
      else if(gameState.phase==='end') setGameState(prev=>({...prev,phase:'teams'}));
    }else{
      const bm={'add-player':'players','edit-player':'player-detail','player-detail':'players','match-detail':'history'};
      nav(bm[screen]||'dashboard');
    }
  };
 
  return (
    <div className="app">
      {loading&&<div className="loading-overlay"><div className="spinner"/><div className="loading-text">טוען...</div></div>}
      <header className="header">
        {showBack?<button className="header-back" onClick={handleBack}>← חזור</button>:<div className="header-logo"><span>⚽</span>{league.name}</div>}
        {showBack&&<div style={{fontWeight:700,fontSize:15}}>{gameState?(gameState.phase==='select'?'בחר שחקנים':gameState.phase==='teams'?'חלוקת קבוצות':'סיום משחק'):titles[screen]||''}</div>}
        {!showBack&&<div style={{display:'flex',alignItems:'center',gap:8}}>
          <button className="btn btn-sm btn-primary" onClick={()=>nav('add-player')}>+ שחקן</button>
          <button className="btn btn-sm btn-ghost" onClick={handleLogout} style={{padding:'6px 10px'}} title="יציאה">🚪</button>
        </div>}
      </header>
      <main style={{flex:1}}>{renderScreen()}</main>
      {!gameState&&<nav className="bottom-nav">
        {[['dashboard','🏠','בית'],['players','👥','שחקנים'],['new-game','⚡','משחק'],['history','📋','היסטוריה'],['rankings','🏆','דירוג']].map(([s,icon,label])=>(
          <div key={s} className={`nav-item ${activeNav===s?'active':''}`} onClick={()=>handleNavClick(s)}>
            <span className="nav-icon">{icon}</span><span>{label}</span>
          </div>
        ))}
      </nav>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
